name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  checks: write
  pull-requests: write
  contents: read
jobs:
  ci:
    name: Build · Tests · Coverage · Analysis
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # requerido por SonarCloud para analizar el historial

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8

      # ── 3. Compilación (syntax check) ──────────────────────────────────────
      - name: Verificar sintaxis (compilar)
        run: python -m py_compile string_calculator.py

      # ── 4. Unit Tests ──────────────────────────────────────────────────────
      - name: Ejecutar tests
        run: |
          pytest test_string_calculator.py \
            -v \
            --tb=short \
            --junitxml=test-results.xml

      # Muestra resultados de tests como check visual en el PR
      - name: Publicar resultados de tests
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results.xml
          check_name: "Resultados de Tests"
          comment_title: "🧪 Resultados de Unit Tests"

      # ── 5. Code Coverage ───────────────────────────────────────────────────
      - name: Generar reporte de coverage
        run: |
          pytest test_string_calculator.py \
            --cov=string_calculator \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      # Sube coverage a Codecov → badge + comentario en PR con diff de cobertura
      - name: Subir coverage a Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true

      # ── 6. Análisis Estático ────────────────────────────────────────────────
      # Flake8 como primera capa (anotaciones inline en el diff del PR)
      - name: Análisis estático con Flake8
        uses: py-actions/flake8@v2
        with:
          max-line-length: "120"
          ignore: "E501"

      # SonarCloud como capa principal (dashboard, quality gate, cobertura visual)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # automático, no necesita configuración
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}      # agregar en Settings → Secrets
